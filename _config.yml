title: Xavier Frankline Odhiambo
description: Backend engineer based in Kenya. Python, Django, PostgreSQL, AWS.
url: "https://xodhiambo.com"

# Permalink format for posts: /posts/post-name.html
permalink: /posts/:title.html

# Use kramdown for Markdown (Jekyll default)
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Don't process these files through Liquid
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Default layout for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"